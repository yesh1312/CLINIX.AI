<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLINIX.AI | One-Click Launch</title>
    <style>
        body {
            background: #020408;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .box {
            padding: 50px;
            border: 1px solid rgba(0, 168, 255, 0.2);
            border-radius: 30px;
            background: rgba(10, 21, 32, 0.5);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            color: #00a8ff;
            margin-bottom: 20px;
            font-family: 'Space Mono', monospace;
        }

        p {
            color: #7aa8c0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: #00a8ff;
            color: #020408;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 168, 255, 0.4);
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>CLINIX.AI 1.5</h1>
        <p>Your premium medical AI platform is optimized for standalone use. Launch the experience instantly from your
            local machine.</p>
        <a href="standalone/index.html" class="btn">Launch Platform</a>
    </div>
</body>

</html>
